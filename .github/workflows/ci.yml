name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_SECRET: test_jwt_secret_for_ci
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci
      VAPID_EMAIL: mailto:test@test.com
      VAPID_PUBLIC_KEY: BERUVkTV2y7EpBYh0Z9mEMUgAieACjKKUD234fnHSbnA0b-P7NR_tuia85uhKXgb4_qzVtfmglL3CsAtii1pG2Y
      VAPID_PRIVATE_KEY: TLFd1CUmjYG3TA9e0cbiTiQrrToaCnnycoR-8_3QlwM
      MONGODB_URI: mongodb://localhost:27017/bloodconnector_test
      NODE_ENV: test
      PORT: 5000
      CLIENT_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/api/health && echo " — server ready" && break
            echo "Waiting for server... attempt $i/20"
            sleep 1
          done

      - name: Run test suite
        run: node test_features.js

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000
